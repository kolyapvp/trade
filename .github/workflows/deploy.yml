name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python syntax
        run: python -m compileall bot main.py

      - name: Verify deploy script syntax
        run: bash -n ops/deploy.sh

      - name: Verify Docker Compose config
        run: docker compose config >/dev/null

      - name: Verify Docker build
        run: docker build -t trade-bot:deploy-check .

  build_release_image:
    name: Build Release Image
    runs-on: ubuntu-latest
    needs:
      - validate
    timeout-minutes: 30
    outputs:
      image_repository: ${{ steps.image.outputs.repository }}
      image_digest: ${{ steps.build.outputs.digest }}
      deploy_image: ${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve image repository
        id: image
        run: echo "repository=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/trade-bot" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.image.outputs.repository }}:${{ github.sha }}
            ${{ steps.image.outputs.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Host
    runs-on: ubuntu-latest
    needs:
      - validate
      - build_release_image
    timeout-minutes: 45
    environment:
      name: production
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      TARGET_SHA: ${{ github.sha }}
      DEPLOY_IMAGE: ${{ needs.build_release_image.outputs.deploy_image }}
      DEPLOY_IMAGE_REGISTRY: ghcr.io
      DEPLOY_IMAGE_USERNAME: ${{ github.repository_owner }}
      DEPLOY_IMAGE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate deploy secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Run remote deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT:-22}" "$DEPLOY_USER@$DEPLOY_HOST" \
            "REPO_DIR='${DEPLOY_PATH:-/opt/trade}' BRANCH='main' TARGET_SHA='$TARGET_SHA' DEPLOY_IMAGE='$DEPLOY_IMAGE' DEPLOY_IMAGE_REGISTRY='$DEPLOY_IMAGE_REGISTRY' DEPLOY_IMAGE_USERNAME='$DEPLOY_IMAGE_USERNAME' DEPLOY_IMAGE_PASSWORD='$DEPLOY_IMAGE_PASSWORD' bash -s" < ops/deploy.sh
