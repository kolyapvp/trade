services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trade}
      POSTGRES_USER: ${POSTGRES_USER:-trade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trade}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '${POSTGRES_HOST_PORT:-5433}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-trade} -d ${POSTGRES_DB:-trade}']
      interval: 10s
      timeout: 5s
      retries: 5

  trade-bot:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    volumes:
      - ./data:/app/data
    environment:
      LOG_FILE: /app/data/trades.json
      LOG_DIR: /app/data/logs
      LOG_RETENTION_DAYS: '7'
      ANALYTICS_TIMEZONE: Europe/Moscow
      METRICS_ENABLED: 'true'
      METRICS_PORT: '9108'
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql://${POSTGRES_USER:-trade}:${POSTGRES_PASSWORD:-trade}@postgres:5432/${POSTGRES_DB:-trade}
    expose:
      - '9108'
    ports:
      - '${BOT_METRICS_HOST_PORT:-9108}:9108'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          'import urllib.request; urllib.request.urlopen("http://127.0.0.1:9108/metrics", timeout=3)',
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s
    stop_grace_period: 2m
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '7'

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - '${PROMETHEUS_HOST_PORT:-9190}:9090'
    depends_on:
      trade-bot:
        condition: service_started

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - '${GRAFANA_HOST_PORT:-3300}:3000'
    depends_on:
      prometheus:
        condition: service_started

volumes:
  redis-data:
  postgres-data:
  prometheus-data:
  grafana-data:
